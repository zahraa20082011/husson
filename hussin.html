<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>روابط التواصل الاجتماعي</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* تغيير خلفية الصفحة إلى الأسود */
        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: #121212;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.05);
            text-align: center;
            width: 90%;
            max-width: 380px;
            border: 1px solid #222222;
        }

        h2 {
            margin-bottom: 8px;
            color: #ffffff;
        }

        p {
            color: #a0a0a0;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .social-links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* تصميم الأزرار */
        .btn-link {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            border-radius: 10px;
            font-size: 16px;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .btn-link:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        /* ألوان المنصات */
        .facebook {
            background-color: #1877f2;
        }

        .instagram {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
        }

        .whatsapp {
            background-color: #25d366;
        }

        .telegram {
            background-color: #0088cc;
        }

        .tiktok {
            background-color: #000000;
            border: 1px solid #333333;
            color: #ffffff;
        }

        .snapchat {
            background-color: #fffc00;
            color: #000000;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>تواصل معي</h2>
        <p>اختر المنصة للوصول السريع لحسابي:</p>

        <div class="social-links">
            
            <a href="https://instagram.com/hz144i" target="_blank" class="btn-link instagram">
                Instagram
            </a>
            
            <a href="https://wa.me/9647855698080" target="_blank" class="btn-link whatsapp">
                WhatsApp
            </a>
            
            <a href="https://t.me/h_a_210" target="_blank" class="btn-link telegram">
                Telegram
            </a>
            

            <a href="https://tiktok.com/h_z.210" target="_blank" class="btn-link tiktok">
                TikTok
            </a>

    
        </div>
    </div>

</body>
</html>
